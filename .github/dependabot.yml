version: 2
updates:
  # Go dependencies
  - package-ecosystem: "gomod"
    directory: "/entrypoint"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "chore"
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
  # Go dependencies
  - package-ecosystem: "gomod"
    directory: "/entrypoint"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "chore"
    target-branch: network-operator-26.1.x
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: network-operator-26.1.x
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
